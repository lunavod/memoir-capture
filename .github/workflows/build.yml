name: Build & Test

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      # --- Python ---
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # --- vcpkg (cached) ---
      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg --depth 1
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      # --- Build wheel ---
      - name: Install build tools
        run: pip install build numpy pytest

      - name: Build wheel
        run: python -m build --wheel

      # --- Test ---
      - name: Install wheel
        run: pip install (Get-ChildItem dist\*.whl).FullName

      - name: Run tests (headless — capture tests skipped)
        run: pytest --headless -v

      # --- Upload artifact ---
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python-version }}
          path: dist/*.whl
