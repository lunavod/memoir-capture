name: Build & Release

on:
  push:
    branches: [main]   # build + test (warms vcpkg cache for tag runs)
    tags: ["v*"]       # build + test + release + publish

permissions:
  contents: write      # for creating GitHub Releases
  id-token: write      # for PyPI trusted publishing

jobs:
  # ── Build wheels for each Python version ──────────────────────────
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for changelog

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # --- vcpkg (cached) ---
      - name: Cache vcpkg binary archives
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'cmake/triplets/*') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg --depth 1
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      # --- Build ---
      - name: Install build tools
        run: pip install build numpy pytest

      - name: Build wheel
        run: python -m build --wheel

      # --- Test ---
      - name: Install wheel
        run: pip install (Get-ChildItem dist\*.whl).FullName

      - name: Run tests (headless)
        run: pytest --headless -v

      # --- Upload artifact ---
      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.python-version }}
          path: dist/*.whl

  # ── Create GitHub Release with changelog (tags only) ──────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all wheels
        uses: actions/download-artifact@v7
        with:
          path: wheels
          pattern: wheel-*
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          # Find previous tag
          PREV=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            # First release — use all commits
            LOG=$(git log --pretty=format:"- %s" ${{ github.ref_name }})
          else
            LOG=$(git log --pretty=format:"- %s" ${PREV}..${{ github.ref_name }})
          fi
          # Write to file for the release body
          echo "$LOG" > changelog.md
          echo "Changelog:"
          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: changelog.md
          files: wheels/*.whl

  # ── Publish to PyPI via trusted publisher (tags only) ─────────────
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
