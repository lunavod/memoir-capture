name: Build & Release

on:
  push:
    branches: [main]   # build + test (warms vcpkg cache for tag runs)
    tags: ["v*"]       # build + test + release + publish
  workflow_dispatch:

permissions:
  contents: write      # for creating GitHub Releases
  id-token: write      # for PyPI trusted publishing

jobs:
  # ── Build wheels for each Python version ──────────────────────────
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for changelog

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # --- vcpkg (cached via Cloudflare R2) ---
      - name: Restore vcpkg binary cache from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          $endpoint = "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          $key = "vcpkg-cache-${{ runner.os }}.tar"
          $localArchive = "$env:RUNNER_TEMP\vcpkg-cache.tar"
          $cacheDir = "$env:LOCALAPPDATA\vcpkg\archives"

          aws s3 cp "s3://github-actions-cache/$key" $localArchive --endpoint-url $endpoint 2>$null
          if ($LASTEXITCODE -eq 0) {
            New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
            tar -xf $localArchive -C $cacheDir
            Write-Host "Restored vcpkg cache from R2"
          } else {
            Write-Host "No existing cache in R2 — will build from scratch"
          }

      - name: Bootstrap vcpkg
        env:
          VCPKG_COMMIT: d90a9b159c08169f39adcd1b0f1ac0ca12c4b96c
        run: |
          git init vcpkg
          cd vcpkg
          git remote add origin https://github.com/microsoft/vcpkg.git
          git fetch --depth 1 origin $env:VCPKG_COMMIT
          git checkout FETCH_HEAD
          cd ..
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      # --- Build ---
      - name: Install build tools
        run: pip install build numpy pytest

      - name: Build wheel
        run: python -m build --wheel

      # --- Test ---
      - name: Install wheel
        run: pip install (Get-ChildItem dist\*.whl).FullName

      - name: Run tests (headless)
        run: pytest --headless -v

      # --- Save vcpkg cache to R2 ---
      - name: Upload vcpkg binary cache to R2
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          $endpoint = "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          $key = "vcpkg-cache-${{ runner.os }}.tar"
          $localArchive = "$env:RUNNER_TEMP\vcpkg-cache.tar"
          $cacheDir = "$env:LOCALAPPDATA\vcpkg\archives"

          if (Test-Path $cacheDir) {
            tar -cf $localArchive -C $cacheDir .
            aws s3 cp $localArchive "s3://github-actions-cache/$key" --endpoint-url $endpoint
            Write-Host "Uploaded vcpkg cache to R2"
          }

      # --- Upload artifact ---
      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.python-version }}
          path: dist/*.whl

  # ── Create GitHub Release with changelog (tags only) ──────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all wheels
        uses: actions/download-artifact@v7
        with:
          path: wheels
          pattern: wheel-*
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          # Find previous tag
          PREV=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            # First release — use all commits
            LOG=$(git log --pretty=format:"- %s" ${{ github.ref_name }})
          else
            LOG=$(git log --pretty=format:"- %s" ${PREV}..${{ github.ref_name }})
          fi
          # Write to file for the release body
          echo "$LOG" > changelog.md
          echo "Changelog:"
          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: changelog.md
          files: wheels/*.whl

  # ── Publish to PyPI via trusted publisher (tags only) ─────────────
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
